<!DOCTYPE html>
<html>
<head>
  <title>Pay with KashLink STK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial; max-width:400px; margin:50px auto; padding:20px; background:#f5f5f5}
    .box{background:white; padding:30px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1)}
    input,button{width:100%; padding:12px; margin-top:10px; border:1px solid #ddd; border-radius:5px; font-size:16px}
    button{background:#1a73e8; color:white; border:none; cursor:pointer; font-weight:bold}
    button:disabled{opacity:0.6}
    #msg{margin-top:15px; padding:10px; border-radius:5px}
    .success{background:#d4edda; color:#155724}
    .error{background:#f8d7da; color:#721c24}
    .info{background:#d1ecf1; color:#0c5460}
  </style>
</head>
<body>
  <div class="box">
    <h2>Pay with M-PESA</h2>
    <form id="payForm">
      <input type="text" id="phone" placeholder="2547XXXXXXXX" required maxlength="12">
      <input type="number" id="amount" placeholder="Amount Ksh" value="100" required>
      <button type="submit" id="btn">Send STK Push</button>
    </form>
    <div id="msg"></div>
  </div>
  <script>
    document.getElementById('payForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      const phone = document.getElementById('phone').value;
      const amount = document.getElementById('amount').value;
      
      if(!phone.startsWith('2547') || phone.length !== 12){
        msg.className = 'error';
        msg.innerText = 'Phone must be 2547XXXXXXXX format';
        return;
      }
      
      btn.disabled = true;
      msg.className = 'info';
      msg.innerText = 'Sending STK Push to ' + phone + '...';
      
      try {
        const res = await fetch('/api/pay', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({phone, amount: parseInt(amount)})
        });
        const data = await res.json();
        msg.className = data.customer_message ? 'success' : 'error';
        msg.innerText = data.customer_message || data.error || 'Check your phone';
      } catch(err) {
        msg.className = 'error';
        msg.innerText = 'Network error. Try again.';
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
